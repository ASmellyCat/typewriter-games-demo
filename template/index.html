<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>游戏标题</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a; color: #d4d4d4;
    font-family: 'Noto Serif SC', serif;
    height: 100vh; display: flex;
    justify-content: center; align-items: center; overflow: hidden;
  }
  #game { max-width: 640px; width: 90%; padding: 40px; position: relative; }

  /* Nav */
  #nav-buttons { position: fixed; top: 20px; right: 20px; z-index: 100; display: flex; gap: 14px; }
  #nav-buttons button { background: none; border: none; color: #555; font-size: 14px; cursor: pointer; transition: color 0.3s; }
  #nav-buttons button:hover { color: #aaa; }

  /* Title screen */
  #title-screen { text-align: center; animation: fadeIn 2s ease; }
  #title-screen h1 { font-size: 72px; font-weight: 700; color: #e8e8e8; margin-bottom: 50px; letter-spacing: 8px; }
  .menu-btn {
    font-family: 'Noto Serif SC', serif; font-size: 15px; color: #888;
    background: none; border: 1px solid #333; padding: 12px 36px;
    cursor: pointer; letter-spacing: 4px; transition: all 0.3s; display: block;
    width: 200px; margin: 10px auto; text-align: center;
  }
  .menu-btn:hover { color: #e8e8e8; border-color: #888; }

  /* Story */
  #story-screen { display: none; overflow-y: auto; max-height: 80vh; }
  #text-container { min-height: 300px; line-height: 2; font-size: 16px; letter-spacing: 1px; }
  #text-container .line { opacity: 0; animation: lineIn 0.5s ease forwards; margin-bottom: 8px; }
  #text-container .line.ending { color: #c9a96e; font-weight: 700; margin-top: 20px; }

  /* Choices */
  #choices { margin-top: 40px; display: flex; flex-direction: column; gap: 12px; }
  #choices button {
    font-family: 'Noto Serif SC', serif; font-size: 15px; color: #888;
    background: none; border: 1px solid #222; padding: 14px 20px;
    cursor: pointer; text-align: left; transition: all 0.3s; letter-spacing: 1px;
  }
  #choices button:hover { color: #e8e8e8; border-color: #666; padding-left: 28px; }
  #choices button .choice-num { color: #c9a96e; margin-right: 12px; }

  /* End buttons */
  #end-buttons { display: none; margin-top: 40px; display: flex; gap: 12px; flex-wrap: wrap; }
  #end-buttons button {
    font-family: 'Noto Serif SC', serif; font-size: 14px; color: #999;
    background: none; border: 1px solid #222; padding: 10px 30px;
    cursor: pointer; letter-spacing: 2px; transition: all 0.3s;
  }
  #end-buttons button:hover { color: #e8e8e8; border-color: #666; }

  /* Cursor */
  .cursor-blink::after { content: '▍'; animation: blink 1s step-end infinite; color: #c9a96e; }

  /* Modal */
  #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 200; justify-content: center; align-items: center; }
  #modal.show { display: flex; }
  #modal-box { background: #111; border: 1px solid #333; padding: 30px 40px; max-width: 320px; text-align: center; }
  #modal-text { color: #d4d4d4; font-size: 15px; margin-bottom: 24px; letter-spacing: 1px; line-height: 1.6; }
  #modal-btns { display: flex; gap: 12px; justify-content: center; }
  #modal-btns button {
    font-family: 'Noto Serif SC', serif; font-size: 14px;
    background: none; border: 1px solid #333; color: #888; padding: 8px 24px;
    cursor: pointer; transition: all 0.3s;
  }
  #modal-btns button:hover { color: #e8e8e8; border-color: #666; }

  /* Scene map */
  .tree-node {
    font-family: 'Noto Serif SC', serif; font-size: 13px;
    background: none; border: 1px solid #222; color: #555;
    padding: 10px 16px; cursor: default; white-space: nowrap;
    transition: all 0.3s; letter-spacing: 1px; display: flex; align-items: center; margin: 4px 0;
  }
  .tree-node.unlocked { color: #888; cursor: pointer; border-color: #333; }
  .tree-node.unlocked:hover { color: #e8e8e8; border-color: #666; }
  .tree-node.ending.unlocked { border-color: #c9a96e66; color: #c9a96e; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes lineIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes blink { 50% { opacity: 0; } }
</style>
</head>
<body>

<div id="nav-buttons" style="display:none;">
  <button onclick="goHome()" title="返回首页">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M3 12l9-9 9 9"/><path d="M5 10v10a1 1 0 001 1h4v-6h4v6h4a1 1 0 001-1V10"/></svg>
  </button>
</div>

<div id="modal">
  <div id="modal-box">
    <div id="modal-text"></div>
    <div id="modal-btns">
      <button id="modal-yes"></button>
      <button id="modal-no" onclick="closeModal()"></button>
    </div>
  </div>
</div>

<div id="game">
  <div id="title-screen">
    <h1 id="game-title"></h1>
    <button class="menu-btn" onclick="enterGame()">进入</button>
  </div>

  <div id="story-screen">
    <div id="text-container"></div>
    <div id="choices"></div>
    <div id="end-buttons"></div>
    <div id="scene-map" style="display:none;"></div>
  </div>
</div>

<!-- ========== STORY DATA ========== -->
<!-- 只需要改这个文件就能做新游戏！ -->
<script src="story.js"></script>

<!-- ========== ENGINE ========== -->
<script>
/*
 * 打字机游戏引擎 v1.0
 * 不要改这个部分！只需要改 story.js
 */

// --- Config ---
const GAME_TITLE = window.GAME_CONFIG?.title || '标题';
const GAME_ID = window.GAME_CONFIG?.id || 'game';
const HOME_URL = window.GAME_CONFIG?.homeUrl || '../';
const TYPE_SPEED = window.GAME_CONFIG?.typeSpeed || 50;
const endings = window.GAME_CONFIG?.endings || [];
const sceneTree = window.GAME_CONFIG?.sceneTree || {};
const sceneNames = window.GAME_CONFIG?.sceneNames || {};
const story = window.GAME_STORY || {};
const epilogue = window.GAME_EPILOGUE || null;

document.getElementById('game-title').textContent = GAME_TITLE;
document.title = GAME_TITLE;

// --- State ---
let currentSceneId = null;
let skipTyping = false;
let cancelScene = false;

const SAVE_KEY = GAME_ID + '_save';
const UNLOCK_KEY = GAME_ID + '_unlocked';
const ENDINGS_KEY = GAME_ID + '_seenEndings';
const DONE_KEY = GAME_ID + '_done';

// --- Save/Load ---
function save() {
  localStorage.setItem(SAVE_KEY, JSON.stringify({ scene: currentSceneId }));
}
function loadSave() { try { return JSON.parse(localStorage.getItem(SAVE_KEY)); } catch(e) { return null; } }
function hasSave() { return !!localStorage.getItem(SAVE_KEY); }
function clearSave() { [SAVE_KEY, UNLOCK_KEY, ENDINGS_KEY, DONE_KEY].forEach(k => localStorage.removeItem(k)); }

// --- Unlock ---
function getUnlocked() { return JSON.parse(localStorage.getItem(UNLOCK_KEY) || '["start"]'); }
function unlock(id) { const u = getUnlocked(); if (!u.includes(id)) { u.push(id); localStorage.setItem(UNLOCK_KEY, JSON.stringify(u)); } }
function getSeenEndings() { return JSON.parse(localStorage.getItem(ENDINGS_KEY) || '[]'); }
function markEnding(id) { if (!endings.includes(id)) return; const s = getSeenEndings(); if (!s.includes(id)) { s.push(id); localStorage.setItem(ENDINGS_KEY, JSON.stringify(s)); } }
function allEndingsSeen() { return endings.length > 0 && endings.every(e => getSeenEndings().includes(e)); }

// --- UI refs ---
const textContainer = document.getElementById('text-container');
const choicesContainer = document.getElementById('choices');
const endButtons = document.getElementById('end-buttons');

// --- Modal ---
function showModal(text, onYes) {
  document.getElementById('modal-text').textContent = text;
  document.getElementById('modal-yes').textContent = '确定';
  document.getElementById('modal-no').textContent = '取消';
  document.getElementById('modal').classList.add('show');
  document.getElementById('modal-yes').onclick = () => { closeModal(); onYes(); };
}
function closeModal() { document.getElementById('modal').classList.remove('show'); }

// --- Navigation ---
function enterGame() {
  document.getElementById('title-screen').style.display = 'none';
  document.getElementById('story-screen').style.display = 'block';
  document.getElementById('nav-buttons').style.display = 'flex';
  const params = new URLSearchParams(window.location.search);
  if (params.get('new') === '1') clearSave();
  if (hasSave() && params.get('new') !== '1') {
    const s = loadSave();
    if (s && s.scene) { playScene(s.scene); return; }
  }
  playScene('start');
}

function goHome() {
  showModal('返回首页？进度将自动保存。', () => { save(); window.location.href = HOME_URL; });
}

// --- Play ---
async function playScene(sceneId) {
  skipTyping = false;
  cancelScene = false;
  currentSceneId = sceneId;
  unlock(sceneId);
  save();

  textContainer.innerHTML = '';
  choicesContainer.innerHTML = '';
  endButtons.style.display = 'none';
  document.getElementById('scene-map').style.display = 'none';

  const scene = story[sceneId];
  if (!scene) return;

  for (let i = 0; i < scene.text.length; i++) {
    if (cancelScene) return;
    const line = scene.text[i];
    const div = document.createElement('div');
    div.className = 'line';
    if (line.startsWith('\u3010')) div.classList.add('ending');
    textContainer.appendChild(div);
    await typeText(div, line);
    await delay(300);
  }

  if (scene.choices.length === 0) {
    markEnding(sceneId);
    save();
    endButtons.style.display = 'flex';
    endButtons.innerHTML = '';

    if (epilogue && allEndingsSeen() && !localStorage.getItem(DONE_KEY)) {
      const contBtn = document.createElement('button');
      contBtn.style.cssText = 'color:#c9a96e;border-color:#c9a96e44;';
      contBtn.textContent = '继续';
      contBtn.onclick = () => playEpilogue();
      endButtons.appendChild(contBtn);
    }

    const menuBtn = document.createElement('button');
    menuBtn.textContent = '返回主界面';
    menuBtn.onclick = () => { save(); window.location.href = HOME_URL; };
    endButtons.appendChild(menuBtn);

    const chapBtn = document.createElement('button');
    chapBtn.textContent = '章节选择';
    chapBtn.onclick = () => showChapters();
    endButtons.appendChild(chapBtn);
    return;
  }

  await delay(500);
  scene.choices.forEach((choice, i) => {
    const btn = document.createElement('button');
    btn.innerHTML = '<span class="choice-num">' + (i+1) + '.</span>' + choice.text;
    btn.onclick = () => playScene(choice.next);
    choicesContainer.appendChild(btn);
  });
}

function typeText(el, text) {
  return new Promise(resolve => {
    if (!text) { resolve(); return; }
    if (skipTyping) { el.textContent = text; resolve(); return; }
    let i = 0;
    el.classList.add('cursor-blink');
    const interval = setInterval(() => {
      if (skipTyping || cancelScene) {
        el.textContent = text; clearInterval(interval);
        el.classList.remove('cursor-blink'); resolve(); return;
      }
      el.textContent = text.slice(0, i + 1); i++;
      if (i >= text.length) { clearInterval(interval); el.classList.remove('cursor-blink'); resolve(); }
    }, TYPE_SPEED);
  });
}

function delay(ms) { return new Promise(r => setTimeout(r, skipTyping ? 0 : ms)); }

// Click to skip
document.getElementById('game').addEventListener('click', (e) => {
  if (e.target.tagName === 'BUTTON' || e.target.closest('button') || e.target.closest('#scene-map')) return;
  skipTyping = true;
});

// --- Chapters ---
function showChapters() {
  const map = document.getElementById('scene-map');
  if (map.style.display !== 'none') {
    map.style.display = 'none';
    textContainer.style.display = '';
    choicesContainer.style.display = '';
    endButtons.style.display = '';
    return;
  }
  textContainer.style.display = 'none';
  choicesContainer.style.display = 'none';
  endButtons.style.display = 'none';
  map.style.display = 'block';
  map.innerHTML = '';

  const title = document.createElement('div');
  title.textContent = '章节选择';
  title.style.cssText = 'color:#c9a96e;font-size:18px;letter-spacing:4px;margin-bottom:24px;';
  map.appendChild(title);

  const unlocked = getUnlocked();

  function buildTree(id) {
    const group = document.createElement('div');
    group.style.cssText = 'display:flex;align-items:center;';
    const node = document.createElement('div');
    const ok = unlocked.includes(id);
    const isEnd = endings.includes(id);
    node.className = 'tree-node' + (ok ? ' unlocked' : '') + (isEnd ? ' ending' : '');
    node.textContent = ok ? (sceneNames[id] || id) : '???';
    if (ok) node.onclick = () => {
      map.style.display = 'none';
      textContainer.style.display = '';
      choicesContainer.style.display = '';
      endButtons.style.display = '';
      playScene(id);
    };
    group.appendChild(node);
    const children = sceneTree[id];
    if (children && children.length) {
      const conn = document.createElement('div');
      conn.style.cssText = 'width:24px;height:1px;background:#333;flex-shrink:0;';
      group.appendChild(conn);
      const col = document.createElement('div');
      col.style.cssText = 'display:flex;flex-direction:column;';
      children.forEach(cid => {
        const row = document.createElement('div');
        row.style.cssText = 'display:flex;align-items:center;margin:4px 0;';
        const hc = document.createElement('div');
        hc.style.cssText = 'width:24px;height:1px;background:#333;flex-shrink:0;';
        row.appendChild(hc);
        row.appendChild(buildTree(cid));
        col.appendChild(row);
      });
      group.appendChild(col);
    }
    return group;
  }
  map.appendChild(buildTree('start'));

  const backBtn = document.createElement('button');
  backBtn.textContent = '返回';
  backBtn.style.cssText = 'font-family:Noto Serif SC,serif;font-size:14px;color:#999;background:none;border:1px solid #222;padding:10px 30px;cursor:pointer;margin-top:24px;letter-spacing:2px;';
  backBtn.onclick = () => { save(); window.location.href = HOME_URL; };
  map.appendChild(backBtn);
}

// --- Epilogue ---
async function playEpilogue() {
  if (!epilogue) return;
  skipTyping = false; cancelScene = false;
  currentSceneId = 'epilogue';
  textContainer.innerHTML = ''; choicesContainer.innerHTML = '';
  endButtons.style.display = 'none';
  document.getElementById('scene-map').style.display = 'none';
  textContainer.style.display = '';

  const game = document.getElementById('game');
  game.style.transition = 'opacity 1s'; game.style.opacity = '0';
  await delay(1500); game.style.opacity = '1';

  for (const line of epilogue.lines) {
    if (cancelScene) return;
    const div = document.createElement('div');
    div.className = 'line';
    textContainer.appendChild(div);
    await typeText(div, line);
    await delay(line === '' ? 100 : 800);
  }

  await delay(1000);
  localStorage.setItem(DONE_KEY, 'true');
  save();

  if (epilogue.nextUrl) {
    const nextBtn = document.createElement('button');
    nextBtn.textContent = epilogue.nextLabel || '下一章';
    nextBtn.style.cssText = 'font-family:Noto Serif SC,serif;font-size:16px;color:#c9a96e;background:none;border:1px solid #c9a96e44;padding:12px 40px;cursor:pointer;letter-spacing:4px;margin-top:40px;animation:fadeIn 2s ease;';
    nextBtn.onclick = () => { window.location.href = epilogue.nextUrl; };
    textContainer.appendChild(nextBtn);
  }
}

// --- Dev Mode ---
const devMode = new URLSearchParams(window.location.search).get('dev');
if (devMode) {
  clearSave();
  endings.forEach(e => markEnding(e));
  Object.keys(story).forEach(k => unlock(k));
  if (devMode === '2') {
    document.getElementById('title-screen').style.display = 'none';
    document.getElementById('story-screen').style.display = 'block';
    document.getElementById('nav-buttons').style.display = 'flex';
    setTimeout(() => playEpilogue(), 100);
  }
}
</script>
</body>
</html>
